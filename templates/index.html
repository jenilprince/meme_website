<html>
    <head>
        <title>Meme Website</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="refresh" content="30;url=http://127.0.0.1:8080/" />
<style>
    body{
        background-color:#121212;
        color:white;
        margin:0;
        padding:0;
        font-family:Arial,sans-serif;

        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;

        min-height:100vh;
    }

    h1{
        font-size:48px;
        margin-top:20px;
        margin-bottom:10px;

        color:#00ffcc;
        text-shadow:2px 2px 10px rgba(0,255,204,0.5);
    }

    p{
        text-align:center;
        font-size:24px;
        margin:10px;
    }

    img{
    width:500px;
    height:auto;

    border-radius:20px;
    border:4px solid white;

    box-shadow:0px 0px 25px rgba(255,255,255,0.3);

    display:block;
    margin:auto;
}

    img:hover{
        transform:scale(1.03);
    }

    .subreddit{
        margin-top:20px;

        font-size:28px;
        font-weight:bold;

        color:#ffcc00;
    }
    button{
    background-color:#00ffcc;

    color:black;

    border:none;

    padding:15px 30px;

    font-size:20px;

    font-weight:bold;

    border-radius:12px;

    cursor:pointer;

    margin-top:20px;

    transition:0.3s;
}

button:hover{
    background-color:#00ccaa;

    transform:scale(1.05);
}
</style>
</head>
<body>
    <h1>A website for memes</h1>
    <p>Here is your meme! This will refresh every 30 seconds.</p>
    <p><img src="{{meme_pic}}"></p>
    <button onclick="window.location.reload()">
    Next Meme
    </button>
    <p class="subreddit">Current Subreddit: {{subreddit}}</p>
</body>
</html>
